<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Econido - Granja Premium</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#f8fafc;
}

/* HERO VIDEO */
.hero {
    position:relative;
    height:300px;
    overflow:hidden;
}
.hero video {
    width:100%;
    object-fit:cover;
}
.hero-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    color:white;
    text-align:center;
    background:rgba(0,0,0,0.5);
    padding:20px;
    border-radius:10px;
}

/* PRODUTOS */
.container {
    padding:20px;
}

.product {
    background:white;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-content {
    padding:15px;
}

.qty {
    width:60px;
}

button {
    background:#16a34a;
    color:white;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* CART */
.cart {
    background:white;
    padding:20px;
    border-radius:12px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

.whatsapp {
    background:#25D366;
    width:100%;
    margin-top:15px;
    font-size:16px;
}
</style>
</head>

<body>

<!-- VIDEO HERO -->
<div class="hero">
    <video autoplay muted loop>
        <source src="img/granja.mp4" type="video/mp4">
    </video>

    <div class="hero-text">
        <h1>🥚 Econido</h1>
        <p>De nuestra granja a tu mesa</p>
    </div>
</div>

<div class="container">

<h2>🌿 Productos</h2>

<div class="product">
    <img src="img/huevos.jpg">
    <div class="product-content">
        <h3>Huevos (30 piezas)</h3>
        <p>$240 MXN</p>
        <input type="number" id="h30" class="qty" placeholder="0">
    </div>
</div>

<div class="product">
    <img src="img/miel.jpg">
    <div class="product-content">
        <h3>Miel Natural</h3>
        <p>$150 MXN</p>
        <input type="number" id="miel" class="qty" placeholder="0">
    </div>
</div>

<div class="product">
    <img src="img/cebollin.jpg">
    <div class="product-content">
        <h3>Cebollín fresco</h3>
        <p>$50 MXN</p>
        <input type="number" id="ceb" class="qty" placeholder="0">
    </div>
</div>
<div class="product">
    <img src="img/cabra.jpg">
    <div class="product-content">
        <h3>Kefir El litro </h3>
        <p>150 MXN</p>
        <input type="number" id="ceb" class="qty" placeholder="0">
    </div>
</div>

<div class="cart">
    <h2>🛒 Pedido</h2>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="tel" placeholder="Teléfono">
    <input type="text" id="dir" placeholder="Dirección">

    <button class="whatsapp" onclick="sendOrder()">
        📲 Finalizar pedido
    </button>
</div>

</div>

<script>
function sendOrder() {

let nombre = document.getElementById("nombre").value;
let tel = document.getElementById("tel").value;
let dir = document.getElementById("dir").value;

if (!nombre || !tel || !dir) {
    alert("Completa tus datos");
    return;
}

let msg = "🛒 Pedido Econido %0A%0A";
msg += "👤 " + nombre + "%0A";
msg += "📞 " + tel + "%0A";
msg += "📍 " + dir + "%0A%0A";

let total = 0;

let h30 = document.getElementById("h30").value;
let miel = document.getElementById("miel").value;
let ceb = document.getElementById("ceb").value;

if (h30 > 0) {
    msg += "🥚 Huevos 30: " + h30 + "%0A";
    total += h30 * 120;
}

if (miel > 0) {
    msg += "🍯 Miel: " + miel + "%0A";
    total += miel * 150;
}

if (ceb > 0) {
    msg += "🌿 Cebollín: " + ceb + "%0A";
    total += ceb * 50;
}

msg += "%0A💰 Total: $" + total;

let url = "https://wa.me/5219982240708?text=" + msg;

window.open(url, "_blank");
}
</script>

</body>
</html>
