<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Econido - Granja Premium</title>
<title>Granja familiar con décadas de tradición en Leona Vicario, produciendo alimentos de forma natural.</title>
<style>
body {
    margin:0;
    font-family: 'Arial', sans-serif;
    background:#f8fafc;
}

/* HERO */
.hero {
    position:relative;
    height:300px;
    overflow:hidden;
}
.hero video {
    width:100%;
    height:100%;
    object-fit:cover;
}
.hero-text {
    position:absolute;
    bottom:20px;
    left:20px;
    color:white;
}
.hero-text h1 {
    margin:0;
    font-size:28px;
}
.hero-text p {
    margin:0;
}

/* CAROUSEL */
.carousel {
    overflow:hidden;
    background:#000;
    padding:10px 0;
}
.carousel-track {
    display:flex;
    animation:scroll 20s linear infinite;
}
.carousel img {
    width:220px;
    height:150px;
    object-fit:cover;
    margin-right:10px;
    border-radius:10px;
}

@keyframes scroll {
    0% {transform:translateX(0);}
    100% {transform:translateX(-50%);}
}

/* PRODUCTS */
.container {
    padding:20px;
}
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
}
.card {
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover {
    transform:translateY(-5px);
}
.img-box {
    height:200px;
    overflow:hidden;
}
.img-box img {
    width:100%;
    height:100%;
    object-fit:cover;
}
.card-content {
    padding:15px;
}
.qty {
    width:60px;
}

/* CART */
.cart {
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

/* BUTTON */
.btn {
    background:#16a34a;
    color:white;
    padding:12px;
    width:100%;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* FLOAT BUTTON */
.float-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:20px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <video autoplay muted loop>
        <source src="img/granja.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
        <h1>🥚 Econido</h1>
        <p>De la granja a tu mesa</p>
    </div>
</div>

<!-- CAROUSEL -->
<div class="carousel">
    <div class="carousel-track">
        <img src="img/flyer1.jpg">
        <img src="img/flyer2.jpg">
        <img src="img/flyer3.jpg">
        <img src="img/flyer4.jpg">
        <img src="img/flyer5.jpg">
        <img src="img/flyer6.jpg">
        <img src="img/flyer7.jpg">
        <img src="img/flyer1.jpg">
        <img src="img/flyer2.jpg">
        <img src="img/flyer3.jpg">
        <img src="img/flyer4.jpg">
        <img src="img/flyer5.jpg">
        <img src="img/flyer6.jpg">
        <img src="img/flyer7.jpg">
        <img src="img/flyer1.jpg">
        <img src="img/flyer2.jpg">
    </div>
</div>

<!-- PRODUCTS -->
<div class="container">
<h2>🌿 Productos, Mejor opción para quien quiere calidad real</h2>

<div class="grid">

<div class="card">
<div class="img-box"><img src="img/huevos.jpg"></div>
<div class="card-content">
<h3>Huevos 30 ( treinta huevos)  </h3>
<p>$240,00 MXN</p>
<input type="number" id="h30" class="qty">
</div>
</div>

<div class="card">
<div class="img-box"><img src="img/miel.jpg"></div>
<div class="card-content">
<h3>Miel Natural</h3>
<p>$150 MXN</p>
<input type="number" id="miel" class="qty">
</div>
</div>

<div class="card">
<div class="img-box"><img src="img/cebollin1.jpg"></div>
<div class="card-content">
<h3>Cebollín 100 Gm </h3>
<p>$50 MXN</p>
<input type="number" id="ceb" class="qty">
</div>
</div>
    <div class="card">
<div class="img-box"><img src="img/cabra.jpg"></div>
<div class="card-content">
<h3> Kefir El litro </h3>
<p>$150 MXN</p>
<input type="number" id="ceb" class="qty">
</div>
</div>


</div>
</div>

<!-- CART -->
<div class="cart">
<h2>🛒 Pedido</h2>
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="tel" placeholder="Teléfono">
<input type="text" id="dir" placeholder="Dirección">

<button class="btn" onclick="sendOrder()">Finalizar Pedido</button>
</div>

<!-- FLOAT -->
<a class="float-btn" href="https://wa.me/5219982240708">💬</a>

<script>
function sendOrder(){

let n = document.getElementById("nombre").value;
let t = document.getElementById("tel").value;
let d = document.getElementById("dir").value;

if(!n||!t||!d){alert("Completa datos");return;}

let msg="Pedido Econido %0A";
msg+="Nombre:"+n+"%0A";

let total=0;

let h=document.getElementById("h30").value;
let m=document.getElementById("miel").value;
let c=document.getElementById("ceb").value;

if(h>0){msg+="Huevos:"+h+"%0A";total+=h*120;}
if(m>0){msg+="Miel:"+m+"%0A";total+=m*150;}
if(c>0){msg+="Cebollin:"+c+"%0A";total+=c*50;}

msg+="Total:$"+total;

window.open("https://wa.me/5219982240708?text="+msg);
}
</script>

</body>
</html>
