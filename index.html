<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Leads → PDF</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}
textarea {
    width:100%;
    height:120px;
    margin-bottom:10px;
}
button {
    padding:10px 20px;
    margin:5px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
}
table {
    width:100%;
    border-collapse: collapse;
    background:white;
    color:black;
}
th, td {
    border:1px solid #ccc;
    padding:8px;
}
th {
    background:#eee;
}
</style>
</head>

<body>

<h1>📊 Leads → PDF</h1>

<textarea id="inputData" placeholder="Cole aqui:
Juan Perez	9981234567	Cancún
Maria Lopez	9987654321	Zona Hotelera"></textarea>

<button onclick="processar()">Organizar</button>
<button onclick="gerarPDF()">📄 Gerar PDF</button>

<div id="areaPDF">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Contato</th>
<th>Endereço</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<script>
function processar() {
    let input = document.getElementById("inputData").value.trim();
    let linhas = input.split("\n");
    let tbody = document.getElementById("tabela");

    tbody.innerHTML = "";

    linhas.forEach(linha => {
        let col = linha.split(/\t|,/);

        if (col.length >= 3) {
            let tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${col[0]}</td>
                <td>${col[1]}</td>
                <td>${col[2]}</td>
            `;

            tbody.appendChild(tr);
        }
    });
}

function gerarPDF() {
    let element = document.getElementById("areaPDF");

    html2pdf()
    .set({
        margin: 10,
        filename: 'leads_econido.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    })
    .from(element)
    .save();
}
</script>

</body>
</html>
