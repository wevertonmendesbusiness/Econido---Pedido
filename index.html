<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Econido - Pedido</title>

<style>
body {
    font-family: Arial;
    background:#f1f5f9;
    margin:0;
}
header {
    text-align:center;
    padding:20px;
    background:#166534;
    color:white;
}
.container {
    padding:20px;
}
.product {
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}
button {
    background:#22c55e;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.cart {
    background:white;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}
input {
    width:100%;
    padding:10px;
    margin-top:10px;
}
.whatsapp {
    background:#25D366;
    width:100%;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
    <h1>🥚 Econido</h1>
    <p>Huevos de libre pastoreo</p>
</header>

<div class="container">

<h2>Productos</h2>

<div class="product">
    <h3>Huevos (30 piezas)</h3>
    <p>$120 MXN</p>
    <input type="number" id="huevos30" placeholder="Cantidad">
</div>

<div class="product">
    <h3>Huevos (60 piezas)</h3>
    <p>$220 MXN</p>
    <input type="number" id="huevos60" placeholder="Cantidad">
</div>

<div class="product">
    <h3>Miel Natural</h3>
    <p>$150 MXN</p>
    <input type="number" id="miel" placeholder="Cantidad">
</div>

<div class="product">
    <h3>Cebollín</h3>
    <p>$50 MXN</p>
    <input type="number" id="cebollin" placeholder="Cantidad">
</div>

<div class="cart">
    <h2>Datos del Cliente</h2>

    <input type="text" id="nombre" placeholder="Nombre completo">
    <input type="text" id="telefono" placeholder="Teléfono">
    <input type="text" id="direccion" placeholder="Dirección de entrega">

    <button class="whatsapp" onclick="enviarPedido()">
        📲 Enviar Pedido por WhatsApp
    </button>
</div>

</div>

<script>
function enviarPedido() {

    let nombre = document.getElementById("nombre").value;
    let telefono = document.getElementById("telefono").value;
    let direccion = document.getElementById("direccion").value;

    if (!nombre || !telefono || !direccion) {
        alert("Por favor completa tus datos");
        return;
    }

    let mensaje = "🛒 *Nuevo Pedido Econido* %0A%0A";

    mensaje += "👤 Nombre: " + nombre + "%0A";
    mensaje += "📞 Teléfono: " + telefono + "%0A";
    mensaje += "📍 Dirección: " + direccion + "%0A%0A";

    let total = 0;

    let h30 = document.getElementById("huevos30").value;
    let h60 = document.getElementById("huevos60").value;
    let miel = document.getElementById("miel").value;
    let ceb = document.getElementById("cebollin").value;

    if (h30 > 0) {
        mensaje += "🥚 Huevos 30: " + h30 + "%0A";
        total += h30 * 120;
    }

    if (h60 > 0) {
        mensaje += "🥚 Huevos 60: " + h60 + "%0A";
        total += h60 * 220;
    }

    if (miel > 0) {
        mensaje += "🍯 Miel: " + miel + "%0A";
        total += miel * 150;
    }

    if (ceb > 0) {
        mensaje += "🌿 Cebollín: " + ceb + "%0A";
        total += ceb * 50;
    }

    mensaje += "%0A💰 Total estimado: $" + total + " MXN";

    let url = "https://wa.me/+5219982240708?text=" + mensaje;

    window.open(url, "_blank");
}
</script>

</body>
</html>
